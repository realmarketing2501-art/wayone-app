version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wayone-db
    environment:
      POSTGRES_USER: wayone
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: wayone_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wayone -d wayone_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wayone-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://wayone:password123@postgres:5432/wayone_db
      JWT_SECRET: dev-secret-change-in-production-min-64-chars-xxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-xxxxxxxxxxxxxxxxxx
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm install && npm run build && npm run seed && npm start"

  frontend:
    image: node:20-alpine
    container_name: wayone-ui
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  pgdata:
